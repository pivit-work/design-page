name: Sync design-system tokens

on:
  repository_dispatch:
    types: [tokens-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest tokens from design-system
        run: |
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/pivit-work/design-system/contents/build/css/tokens.css" \
            -o src/tokens.css

          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/pivit-work/design-system/contents/build/css/tokens-dark.css" \
            -o src/tokens-dark.css

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/tokens.css src/tokens-dark.css
          git diff --staged --quiet || git commit -m "style: design-system 토큰 자동 동기화"
          git push
